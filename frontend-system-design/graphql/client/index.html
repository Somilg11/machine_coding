<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphQL Client</title>
</head>
<body>
    <h1>GraphQL Client</h1>
</body>
<script>
    fetch('http://localhost:4000/graphql', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            query: `
                {problems {
                    id
                    title
                    solvers {id, name}
                }}
            `
        })
    })
</script>
</html>
